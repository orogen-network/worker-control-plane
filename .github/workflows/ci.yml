name: ci

on:
  pull_request:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  ci:
    name: ci
    runs-on: ubuntu-latest
    timeout-minutes: 45
    steps:
      - uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683
      - uses: dtolnay/rust-toolchain@72e0b3f2339874da45e95c19a5ad418a9994f7a5
      - uses: astral-sh/setup-uv@6b9c6063abd6010835644d4c2e1bef4cf5cd0fca
      - uses: actions/setup-python@a26af69be951a213d495a4c3e4e4022e16d87065
        with:
          python-version: "3.12"
      - uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020
        with:
          node-version: "20"
      - name: Restore split-repo sibling dependencies
        run: |
          if [ -f package.json ] && grep -q 'file:../wallet-sdk-core/pkg' package.json; then
            git clone --depth 1 https://github.com/orogen-network/wallet-sdk-core ../wallet-sdk-core
          fi
          if [ -f Cargo.toml ] && grep -q 'path = "../wallet-sdk-core"' Cargo.toml; then
            git clone --depth 1 https://github.com/orogen-network/wallet-sdk-core ../wallet-sdk-core
          fi
          if [ -f pyproject.toml ] && grep -q 'path = "../customer-sdk-py"' pyproject.toml; then
            git clone --depth 1 https://github.com/orogen-network/customer-sdk-py ../customer-sdk-py
          fi
          if [ "${GITHUB_REPOSITORY##*/}" = "docs-site" ]; then
            git clone --depth 1 https://github.com/orogen-network/landing-site ../landing-site
          fi
      - uses: actions/cache@0c45773b623bea8c8e75f6c82b208c3cf94ea4f9
        if: ${{ hashFiles('Cargo.toml') != '' }}
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            target
          key: cargo-${{ runner.os }}-${{ hashFiles('**/Cargo.lock', '**/Cargo.toml') }}
      - name: Rust checks
        run: |
          if [ -f Cargo.toml ]; then
            cargo check --workspace --all-features
            cargo test --workspace --all-features
          fi
      - name: Python checks
        run: |
          if [ -f pyproject.toml ]; then
            uv sync --extra dev
            uv run ruff check .
            uv run pytest -q
          fi
      - name: TypeScript checks
        run: |
          if [ -f package.json ]; then
            if [ -f package-lock.json ]; then
              npm ci --no-audit --no-fund
            else
              npm install --no-audit --no-fund
            fi
            npm run --if-present lint
            npm run --if-present typecheck
            npm run --if-present build
            npm run --if-present test -- --run
          fi
      - name: README-only check
        run: |
          if [ ! -f Cargo.toml ] && [ ! -f pyproject.toml ] && [ ! -f package.json ]; then
            test -f README.md
          fi
